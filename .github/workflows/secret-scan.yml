name: Secret Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Quick secret scan
        run: |
          echo "Running secret scan..."
          if grep -RIn --exclude-dir=.git --exclude='*.sample' -E 'sk-|AIza|-----BEGIN PRIVATE KEY-----|ssh-rsa|ghp_' .; then
            echo "POTENTIAL SECRETS FOUND. Failing build."
            exit 1
          else
            echo "No obvious secrets found."
          fi
